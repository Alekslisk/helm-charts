replicaCount: 2

image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

networkPolicy:
  enabled: true
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend

rbac:
  create: true
  roleName: pod-reader

serviceAccount:
  create: true
  name: ""

postgresql:
  image:
    tag: "15.4.0"

redis:
  image:
    tag: "7.2.3"